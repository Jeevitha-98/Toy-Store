        /**
 * Strict RegEx Field Guard: Strips out numbers from the Name field immediately.
 */
function enforceCharacterRestrictions(inputElement) {
    inputElement.value = inputElement.value.replace(/[0-9]/g, '');
}

/**
 * Strict RegEx Field Guard: Strips out letters from the Mobile field immediately.
 */
function enforceNumberRestrictions(inputElement) {
    inputElement.value = inputElement.value.replace(/[^0-9]/g, '');
}

/**
 * FIXED: Professional Vector Eye Toggle Router Module
 * Controls the visibility toggle state and updates the struck-out diagonal line vector state smoothly.
 */
function togglePasswordVisibilityField(inputId, buttonElement) {
    const passwordInput = document.getElementById(inputId);
    const eyeOpenIcon = buttonElement.querySelector('.eye-open');
    const eyeSlashedIcon = buttonElement.querySelector('.eye-slashed');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        // Hide the open eye vector, reveal the struck-out slashed vector overlay path
        eyeOpenIcon.classList.add('display-hidden');
        eyeSlashedIcon.classList.remove('display-hidden');
    } else {
        passwordInput.type = 'password';
        // Reveal the open eye vector, hide the struck-out slashed vector overlay path
        eyeOpenIcon.classList.remove('display-hidden');
        eyeSlashedIcon.classList.add('display-hidden');
    }
}

/**
 * Validates signup credentials, tracks errors, and logs in with dynamic redirection.
 */
function executeSignUpProcess(event) {
    event.preventDefault(); 
    
    const alertBanner = document.getElementById('auth-validation-alert');
    const nameValue = document.getElementById('signup-client-name').value.trim();
    const emailValue = document.getElementById('signup-client-email').value.trim();
    const phoneValue = document.getElementById('signup-client-phone').value.trim();
    const passwordValue = document.getElementById('signup-client-password').value.trim();
    const confirmValue = document.getElementById('signup-client-confirm').value.trim();

    if (!nameValue || !emailValue || !phoneValue || !passwordValue || !confirmValue) {
        alertBanner.innerText = "Please fill all fields before signing up.";
        alertBanner.className = "validation-status-banner alert-error";
        return;
    }

    if (!emailValue.includes('@') || !emailValue.includes('.')) {
        alertBanner.innerText = "Please enter a valid electronic mail address.";
        alertBanner.className = "validation-status-banner alert-error";
        return;
    }

    if (phoneValue.length !== 10) {
        alertBanner.innerText = "Please enter a valid 10-digit mobile number.";
        alertBanner.className = "validation-status-banner alert-error";
        return;
    }

    if (passwordValue !== confirmValue) {
        alertBanner.innerText = "Error: Passwords do not match. Re-enter keys.";
        alertBanner.className = "validation-status-banner alert-error";
        return;
    }

    alertBanner.innerText = "Successfully logged in! Use these credentials to login.";
    alertBanner.className = "validation-status-banner alert-success";

    setTimeout(() => {
        window.location.href = "login.html";
    }, 2000);
}
