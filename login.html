    <script>
/**
 * FIXED AUTOMATED ROUTER VALUE MATRIX:
 * Validates inputs, saves active input strings, and routes dynamically based on access selections.
 */
function executeLoginProcess(event) {
    event.preventDefault(); // Blocks default form browser page flashing updates

    const alertBanner = document.getElementById('auth-validation-alert');
    const emailField = document.getElementById('auth-client-email');
    const passwordField = document.getElementById('auth-client-password');

    // Safety fallback: verify if the input elements exist on the current page DOM
    if (!emailField || !passwordField || !alertBanner) {
        console.error("Critical Error: Core login input elements are missing from the page DOM.");
        return;
    }

    const emailValue = emailField.value.trim();
    const passwordValue = passwordField.value.trim();

    // 1. Mandatory Data Checks
    if (!emailValue || !passwordValue) {
        alertBanner.innerText = "Please fill all fields before logging in.";
        alertBanner.className = "validation-status-banner alert-error";
        alertBanner.classList.remove('alert-hidden');
        return;
    }

    if (!emailValue.includes('@') || !emailValue.includes('.')) {
        alertBanner.innerText = "Please enter a valid electronic mail address.";
        alertBanner.className = "validation-status-banner alert-error";
        alertBanner.classList.remove('alert-hidden');
        return;
    }

    // Saves the user-entered email string into browser memory before jumping pages
    localStorage.setItem("activeSessionUserEmail", emailValue);

    alertBanner.innerText = "Authorization granted! Initializing secure custom sandbox terminal...";
    alertBanner.className = "validation-status-banner alert-success";
    alertBanner.classList.remove('alert-hidden');

    // 2. FIXED STABLE ROUTING PATH ENGINE:
    // Detects which role card is currently selected by looking at the inner text content
    const activeRoleNode = document.querySelector('.role-selector-node.active-node');
    let finalDestinationRoute = "dashboard.html"; // Safe automated default fallback point

    if (activeRoleNode) {
     const roleTitleText = activeRoleNode.innerText.toLowerCase();

if (roleTitleText.includes("client") || roleTitleText.includes("registry")) {
    finalDestinationRoute = "client-dashboard.html";
} else {
    finalDestinationRoute = "partner-dashboard.html";
}
    }

    // 3. EXECUTE SAFE DELAYED NAVIGATIONAL TRANSITION
    setTimeout(() => {
        console.log("Securely routing user forward to session dashboard destination: " + finalDestinationRoute);
        window.location.href = finalDestinationRoute;
    }, 1200);
}

/* ==========================================
   ROLE SELECTOR
========================================== */

function toggleActiveRoleNode(selectedNode) {

    // Remove active class from every card
    document.querySelectorAll(".role-selector-node").forEach(function(node){
        node.classList.remove("active-node");
    });

    // Activate clicked card
    selectedNode.classList.add("active-node");
}
