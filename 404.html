<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Stackly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="error-page-body">

    <!-- Immersive 404 Error Section Workspace Container -->
    <section class="error-404-section">
        
        <!-- Base Background Image Cover Layer -->
        <img src="./Assests/baby with toys.webp" alt="Scattered Toy Blocks Playground" class="error-bg-backdrop">
        
        <!-- Dark Mask Scrim Layer for Text Readability Protection -->
        <div class="error-dark-mask"></div>

        <!-- Floating Interactive Glassmorphic Content Card Chassis -->
        <div class="error-glass-card animate-scale-up">
            
            <!-- Dynamic Floating 3D Vector Block Simulation -->
            <div class="error-graphic-hull">
                <svg class="error-vector-icon" xmlns="http://w3.org" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
            </div>

            <!-- Massive Text-Shadow Neon Numbers -->
            <h1 class="error-code">4<span class="glow-coral-digit">0</span>4</h1>
            
            <h2 class="error-headline">Oops! This Tower Collapsed.</h2>
            
            <!-- High-Visibility Paragraph Block Content -->
            <p class="error-paragraph">
                The layout link you are looking for has been moved, stacked somewhere else, or completely built over. Let's return you safely back to our creative play studio workspace coordinates.
            </p>

            <!-- Dual Action Navigation Recovery Array Grid Link Bar -->
            <div class="error-actions-hub">
                <button class="error-btn btn-back-outline" onclick="executeHistoryBack(event)">
                    <svg xmlns="http://w3.org" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    <span>Go Back</span>
                </button>
                
                <a href="index.html" class="error-btn btn-home-glow">
                    <svg xmlns="http://w3.org" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span>Home Space</span>
                </a>
            </div>

        </div>
    </section>

    <style>
        /* --- High-Contrast Immersive 404 Canvas Framework --- */
.error-page-body {
    background-color: #0d0f14;
    overflow: hidden !important; /* Prevents scrollbars during page layout initialization */
    width: 100vw;
    height: 100vh;
}

.error-404-section {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 5%;
}

/* Background Image Base Cover Layer Configuration */
.error-bg-backdrop {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 1;
    transform: scale(1.03); /* Padding buffer room to smooth hover transformations */
    transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
}

.error-404-section:hover .error-bg-backdrop {
    transform: scale(1.01);
}

/* Linear Scrim Overlay protects readability text paths perfectly */
.error-dark-mask {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(13, 15, 20, 0.9) 0%, rgba(20, 24, 33, 0.75) 100%);
    z-index: 2;
}

/* Central Frosted Glass Chassis Card Box */
.error-glass-card {
    position: relative;
    z-index: 3;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 3.5rem;
    max-width: 580px;
    width: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35);
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.4s, box-shadow 0.4s;
}

/* Floating Vector Logo Frame Container */
.error-graphic-hull {
    color: var(--secondary-teal);
    width: 60px;
    height: 60px;
    margin-bottom: 1rem;
}

.error-vector-icon {
    width: 100%;
    height: 100%;
    animation: blockFloatError 3s infinite ease-in-out alternate;
}

/* Massive 404 Digit Layers */
.error-code {
    color: #ffffff;
    font-size: clamp(4.5rem, 12vw, 6.5rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 0.5rem;
}

/* Neon Coral Drop Shadow Aura Glow Digit modifier */
.glow-coral-digit {
    color: var(--primary-coral);
    text-shadow: 0 0 30px rgba(255, 107, 107, 0.6), 0 0 60px rgba(255, 107, 107, 0.3);
}

.error-headline {
    color: #ffffff;
    font-size: clamp(1.4rem, 4vw, 1.8rem);
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 1rem;
    transition: color 0.3s ease;
}

/* Crisp high-readability description text layer */
.error-paragraph {
    color: rgba(255, 255, 255, 0.85);
    font-size: 0.98rem;
    line-height: 1.65;
    margin-bottom: 2.2rem;
    max-width: 460px;
    transition: color 0.3s ease, transform 0.3s ease;
    cursor: default;
}

/* Recovery Navigation Button line container */
.error-actions-hub {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    width: 100%;
    justify-content: center;
}

.error-btn {
    text-decoration: none;
    border: none;
    padding: 1rem 2rem;
    font-size: 0.98rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

/* Transparent Back Outline Button profile */
.btn-back-outline {
    background-color: transparent;
    border: 2px solid #ffffff;
    color: #ffffff;
}

.btn-back-outline:hover {
    background-color: #ffffff;
    color: var(--dark-charcoal);
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
}

.btn-back-outline svg { transition: transform 0.3s ease; }
.btn-back-outline:hover svg { transform: translateX(-4px); }

/* Solid main coral home redirect capsule button layout */
.btn-home-glow {
    background-color: var(--primary-coral);
    color: #ffffff;
    box-shadow: 0 6px 20px rgba(255, 107, 107, 0.25);
}

.btn-home-glow:hover {
    background-color: #ff5252;
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(255, 107, 107, 0.45);
}

/* --- Hardware Accelerated Hover & Aura Glow Effects --- */
.error-glass-card:hover {
    transform: translateY(-4px);
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.25);
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.45);
}

.error-glass-card:hover .error-headline { color: var(--secondary-teal); }
.error-glass-card:hover .error-paragraph { color: #ffffff; transform: scale(1.002); }

/* --- High Performance Keyframe Motors --- */
@keyframes blockFloatError {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-12px) rotate(5deg); filter: drop-shadow(0 10px 15px rgba(78, 205, 196, 0.4)); }
}

.animate-scale-up {
    opacity: 0;
    transform: scale(0.95) translateY(10px);
    animation: entryScaleUpTransform 0.6s cubic-bezier(0.25, 1, 0.5, 1) 0.1s forwards;
}

@keyframes entryScaleUpTransform {
    100% { opacity: 1; transform: scale(1) translateY(0); }
}

/* --- Responsive Media Viewports Overhaul --- */
@media (max-width: 550px) {
    .error-glass-card { padding: 2.5rem 1.2rem; border-radius: 24px; }
    .error-actions-hub { flex-direction: column-reverse; gap: 1rem; }
    .error-btn { width: 100%; justify-content: center; }
}

    </style>

    <script>
/**
 * FIXED 404 HISTORY BACK CONTROLLER:
 * Checks session memory tracks to see if the user came from a specific dashboard tab section.
 * Routes them back seamlessly to that exact panel layout instead of resetting to page one.
 */
function executeHistoryBack(event) {
    event.preventDefault(); // Stop standard default layout hash jumping actions

    // 1. Pull the last viewed dashboard unique ID token from session memory cache track
    const lastActiveDashboardSection = sessionStorage.getItem("lastViewedDashboardSectionId");

    if (lastActiveDashboardSection) {
        // 2. Clear out the variable token so it doesn't get stuck permanently
        sessionStorage.removeItem("lastViewedDashboardSectionId");
        
        // 3. Force the window location path straight back into the main dashboard file deck
        // This will allow your dashboard's DOM initializer to auto-load that exact section panel card
        window.location.href = "dashboard.html";
        return;
    }

    // 4. Standard Fallback Track: If the user didn't come from an internal dashboard tab section
    if (window.history.length > 1) {
        window.history.back(); // Safely step back into native browser timeline records
    } else {
        window.location.href = 'index.html'; // Fallback redirect if page opened inside a fresh browser tab session
    }
}


    </script>
</body>
</html>
